<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Task Results</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        color: #1f2937;
      }

      main {
        width: min(900px, calc(100% - 32px));
        margin: 40px auto;
      }

      h1 {
        margin-bottom: 24px;
        font-size: 32px;
      }

      section {
        margin-bottom: 16px;
        padding: 20px;
        border: 1px solid #d7dde4;
        border-radius: 8px;
        background: #ffffff;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        font-size: 16px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JavaScript Task Results</h1>

      <section>
        <h2>1. Repeated Digits</h2>
        <pre id="repeated-digits"></pre>
      </section>

      <section>
        <h2>2. Palindrome</h2>
        <pre id="palindrome"></pre>
      </section>

      <section>
        <h2>3. Smaller Than Entered Number</h2>
        <pre id="smaller-than"></pre>
      </section>

      <section>
        <h2>4. Abundant or Deficient</h2>
        <pre id="abundant-deficient"></pre>
      </section>

      <section>
        <h2>5. Squared Array</h2>
        <pre id="squared-array"></pre>
      </section>
    </main>

    <script src="tasks.js"></script>
  </body>
</html>
